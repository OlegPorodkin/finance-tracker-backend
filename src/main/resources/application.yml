spring:
  threads:
    virtual:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET}
  rate-limit:
    enabled: true
    login:
      capacity: 5
      refill-minutes: 1
    register:
      capacity: 5
      refill-minutes: 60
    refresh:
      capacity: 30
      refill-minutes: 1

server:
  forward-headers-strategy: native
